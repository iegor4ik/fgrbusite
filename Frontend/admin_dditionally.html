<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Адмін - Додатково</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./CSS/style.css" />
  <link rel="stylesheet" href="./CSS/admin.css" />
  <script>
    // Prevent theme flash - apply theme before page renders
    (function() {
      try {
        const saved = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const shouldBeDark = saved === 'dark' || (saved === null && prefersDark);
        if (shouldBeDark) {
          const style = document.createElement('style');
          style.textContent = 'body { background: #1A1F36; color: #F8F9FA; }';
          document.head.appendChild(style);
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div class="admin-page">
    <input type="checkbox" id="sidebarToggle" class="sidebar-checkbox" />
    <header class="admin-header">
      <label for="sidebarToggle" class="sidebar-toggle-btn" aria-label="Переключити бічну панель">☰</label>
      <div class="admin-header-left">Адмін - Додатково</div>
      <div class="admin-header-right">Офіційний сайт Федерація греко-римської боротьби України</div>
    </header>
    <div class="admin-layout">
      <aside class="admin-sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">Меню</span>
        </div>
        <nav class="sidebar-nav">
          <a href="admin.html"><span class="nav-icon">🏠</span><span class="nav-label">Головна (Дашборд)</span></a>
          <a href="admin_news.html"><span class="nav-icon">📰</span><span class="nav-label">Керування новинами</span></a>
          <a href="admin_gallery.html"><span class="nav-icon">🖼️</span><span class="nav-label">Галерея</span></a>
          <a href="admin_dditionally.html"><span class="nav-icon">⚙️</span><span class="nav-label">Додатково</span></a>
        </nav>
        <button class="logout-btn" type="button" onclick="window.location.href='index.html'">Вийти</button>
      </aside>
      <main class="admin-main">
        <section class="dashboard-overview">
          <h2>Додаткові налаштування</h2>
          <p>Оберіть секцію для керування додатковим вмістом.</p>
        </section>

        <div class="dashboard-cards" style="grid-template-columns: 1fr;">
          <article class="dashboard-card">
            <nav class="sidebar-nav">
              <a href="admin_documents.html"><span class="nav-icon">📄</span><span class="nav-label">Документація</span></a>
              <a href="#"><span class="nav-icon">🏛️</span><span class="nav-label">Клуби</span></a>
              <a href="#"><span class="nav-icon">👨‍🏫</span><span class="nav-label">Тренера</span></a>
              <a href="#"><span class="nav-icon">🤼‍♂️</span><span class="nav-label">Спортсмени</span></a>
            </nav>
          </article>
        </div>
      </main>
    </div>
  </div>

  <button class="theme-toggle" id="themeToggle" aria-label="Перемкнути тему"><span class="theme-icon">🌙</span></button>
  <script src="./JS/main.js" defer></script>
</body>
</html>
